<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Etsy Risk Checker Pro</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
    textarea { width: 100%; padding: 10px; font-size: 14px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .result-box { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-top: 20px; border-radius: 4px; }
    .tro-alert { background: #fff3cd; border: 1px solid #ffc107; padding: 12px; margin-top: 10px; border-radius: 4px; }
    .tro-alert strong { color: #d9534f; }
    .warning { color: #d9534f; font-weight: bold; }
    #remaining { color: #666; font-size: 14px; margin-left: 10px; }
  </style>
</head>
<body>

<h2>🛡️ Etsy Infringement Risk Checker Pro</h2>
<p>Check if your product listing may trigger a TRO (Temporary Restraining Order)</p>

<textarea id="input" placeholder="Enter product title or description, e.g. custom disney shirt for kids" rows="4"></textarea>
<br><br>

<button id="checkBtn" onclick="checkRisk()">🔍 Check Risk</button>
<span id="remaining">Free checks remaining: 5</span>

<div id="result"></div>

<script>

// ==================== CONFIG ====================
const DEEPSEEK_API_KEY = "sk-d693867cebe641e68895cd563f7fb7e5";

// ==================== TRO DATABASE ====================
const TRO_DATABASE = {
    "disney": { active: true, lawFirm: "GBC", lastCase: "Jan 2025", note: "Disney has filed TROs frequently in the past 12 months, targeting unauthorized character prints on Etsy." },
    "hermes": { active: true, lawFirm: "GBC", lastCase: "Mar 2025", note: "Hermès aggressively pursues Birkin/Kelly bag replicas. Typical settlement: $2,000–$10,000." },
    "nike": { active: true, lawFirm: "GBC", lastCase: "Feb 2025", note: "Nike enforces Air Jordan, Swoosh, and sneaker design rights across platforms." },
    "rolex": { active: true, lawFirm: "Keith", lastCase: "Jan 2025", note: "Rolex targets replica watches and listings using 'Rolex' as a keyword." },
    "chanel": { active: true, lawFirm: "GBC", lastCase: "Apr 2025", note: "Chanel files TROs against listings featuring double-C logos, pearl elements, or quilted patterns." },
    "louis vuitton": { active: true, lawFirm: "GBC", lastCase: "Mar 2025", note: "LV protects its monogram, checkerboard, and Speedy bag silhouette." },
    "harry potter": { active: true, lawFirm: "Warner Bros Legal", lastCase: "Feb 2025", note: "Warner Bros. enforces Hogwarts, Gryffindor, and related Harry Potter terms." },
    "starbucks": { active: true, lawFirm: "Starbucks Legal", lastCase: "Dec 2024", note: "Starbucks monitors the green mermaid logo and related design elements." },
    "nintendo": { active: true, lawFirm: "Nintendo Legal", lastCase: "Jan 2025", note: "Nintendo strictly protects Pokémon, Mario, and other game character designs." }
};

// ==================== FREE CHECK LIMIT ====================
const MAX_FREE = 5;
function getRemaining() {
    let count = localStorage.getItem("etsy_checker_count");
    if (count === null) { localStorage.setItem("etsy_checker_count", MAX_FREE); return MAX_FREE; }
    return parseInt(count);
}
function useOne() {
    let r = getRemaining();
    if (r > 0) { localStorage.setItem("etsy_checker_count", r - 1); }
    updateRemainingDisplay();
}
function updateRemainingDisplay() {
    let r = getRemaining();
    document.getElementById("remaining").innerText = `Free checks remaining: ${r}`;
    if (r <= 0) { document.getElementById("checkBtn").disabled = true; document.getElementById("remaining").innerHTML = '<span class="warning">No free checks remaining. Contact us to upgrade.</span>'; }
}

// ==================== TRO ALERT ====================
function checkTRO(text) {
    let alerts = [];
    text = text.toLowerCase();
    for (let [brand, info] of Object.entries(TRO_DATABASE)) {
        if (text.includes(brand) && info.active) alerts.push({ brand, ...info });
    }
    return alerts;
}
function renderTROAlert(alerts) {
    if (alerts.length === 0) return "";
    let html = '<div class="tro-alert"><strong>⚠️ TRO Alert: High-risk brand(s) detected</strong><ul>';
    alerts.forEach(a => { html += `<li><b>${a.brand.toUpperCase()}</b> — Law Firm: ${a.lawFirm} | Latest Case: ${a.lastCase}<br>📌 ${a.note}</li>`; });
    html += '</ul><p style="font-size:13px;color:#666;">Based on publicly available TRO case records. Verify independently before listing.</p></div>';
    return html;
}

// ==================== CORE CHECK ====================
async function checkRisk() {
    if (getRemaining() <= 0) {
        document.getElementById("result").innerHTML = '<div class="result-box"><p class="warning">No free checks remaining.</p><p>Contact us to upgrade.</p></div>';
        return;
    }
    const userInput = document.getElementById("input").value.trim();
    if (!userInput) { alert("Please enter a product title or description"); return; }
    useOne();
    document.getElementById("result").innerHTML = '<div class="result-box">⏳ Analyzing...</div>';

    const prompt = `You are an Etsy intellectual property risk analysis expert specializing in TRO prevention.\n\nEvaluate: "${userInput}"\n\nAnalyze: 1) Trademark keywords 2) Copyrighted characters/IP 3) Brand style similarity 4) Risky language ("inspired by", "compatible with", "custom [brand]" none of which exempt from infringement).\n\nReturn STRICTLY:\nRisk Level: [LOW/MEDIUM/HIGH]\nReasons:\n- reason 1\n- reason 2\n- reason 3 (max 3)\nAdvice:\n- suggestion 1\n- suggestion 2\nTRO Risk Note: [If HIGH, note brand's TRO history. If LOW, write "N/A"]`;

    try {
        const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + DEEPSEEK_API_KEY
            },
            body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "user", content: prompt }], temperature: 0.2 })
        });
        const data = await response.json();
        if (!data.choices || !data.choices[0]) {
            document.getElementById("result").innerHTML = `<div class="result-box"><p class="warning">API Error</p><pre>${JSON.stringify(data,null,2)}</pre></div>`;
            return;
        }
        const aiResult = data.choices[0].message.content;
        const troAlerts = checkTRO(userInput);
        const troHTML = renderTROAlert(troAlerts);
        document.getElementById("result").innerHTML = '<div class="result-box"><h3>Risk Analysis</h3><pre>' + aiResult + '</pre>' + troHTML + '</div>';
    } catch (error) {
        document.getElementById("result").innerHTML = `<div class="result-box"><p class="warning">Request failed: ${error.message}</p></div>`;
    }
}

// ==================== INIT ====================
window.onload = function() {
    updateRemainingDisplay();
    if (getRemaining() <= 0) document.getElementById("checkBtn").disabled = true;
};
</script>

</body>
</html>
